version: "3.1"

rules:
# Basic conversation management
- rule: Ask the user to rephrase whenever they send a message with low NLU confidence
  steps:
  - intent: nlu_fallback
  - action: utter_please_rephrase

- rule: Say goodbye
  steps:
  - intent: goodbye
  - action: utter_goodbye

- rule: Bot challenge
  steps:
  - intent: bot_challenge
  - action: utter_iamabot

- rule: Ask if that helped and user says yes
  steps:
  - action: utter_did_that_help
  - intent: affirm
  - action: utter_happy

- rule: Ask if that helped and user says no
  steps:
  - action: utter_did_that_help
  - intent: deny
  - action: utter_cheer_up

- rule: Greet user
  steps:
  - intent: greet
  - action: utter_greet

- rule: Thank you response
  steps:
  - intent: thank_you
  - action: utter_thank_back

- rule: Cardiac arrest explanation
  steps:
  - intent: what_is_cardiac_arrest
  - action: utter_cardiac_arrest_explanation

- rule: CPR steps
  steps:
  - intent: how_to_cpr
  - action: utter_cpr_steps

- rule: Emergency numbers
  steps:
  - intent: emergency_numbers
  - action: utter_emergency_numbers

- rule: Symptoms description
  steps:
  - intent: symptoms
  - action: utter_symptoms_description_one

- rule: Choking help
  steps:
  - intent: choking_help
  - action: utter_choking_help

- rule: Bleeding control
  steps:
  - intent: bleeding_control
  - action: utter_bleeding_control

- rule: Burns treatment
  steps:
  - intent: burns_treatment
  - action: utter_burns_treatment

- rule: Fracture help
  steps:
  - intent: fracture_help
  - action: utter_fracture_help

- rule: Stroke recognition
  steps:
  - intent: stroke_recognition
  - action: utter_stroke_recognition

- rule: Seizure help
  steps:
  - intent: seizure_help
  - action: utter_seizure_help

- rule: Allergic reaction
  steps:
  - intent: allergic_reaction
  - action: utter_allergic_reaction

- rule: Recovery position
  steps:
  - intent: recovery_position
  - action: utter_recovery_position

- rule: Child CPR
  steps:
  - intent: child_cpr
  - action: utter_child_cpr

- rule: What is defibrillator
  steps:
  - intent: what_is_defibrillator
  - action: utter_what_is_defibrillator

- rule: How to use defibrillator
  steps:
  - intent: how_to_defibrillator
  - action: utter_how_to_defibrillator

- rule: Shock treatment
  steps:
  - intent: shock_treatment
  - action: utter_shock_treatment

- rule: Hypothermia help
  steps:
  - intent: hypothermia_help
  - action: utter_hypothermia_help

- rule: Heat exhaustion
  steps:
  - intent: heat_exhaustion
  - action: utter_heat_exhaustion

- rule: Poisoning help
  steps:
  - intent: poisoning_help
  - action: utter_poisoning_help

- rule: Drowning rescue
  steps:
  - intent: drowning_rescue
  - action: utter_drowning_rescue

########################################
# DISAMBIGUATION RULES
########################################

- rule: Ask age when CPR question is general
  steps:
    - intent: cpr_general
    - action: utter_ask_age_group

- rule: Ask age when choking question is general
  steps:
    - intent: choking_general
    - action: utter_ask_choking_age


########################################
# AGE GROUP SELECTION
########################################

- rule: User chooses adult CPR
  steps:
    - intent: age_group_adult
    - action: utter_adult_cpr

- rule: User chooses child CPR
  steps:
    - intent: age_group_child
    - action: utter_child_cpr


########################################
# CPR-SPECIFIC RULES
########################################

- rule: Adult CPR steps
  steps:
    - intent: adult_cpr_steps
    - action: utter_adult_cpr

- rule: Child CPR steps
  steps:
    - intent: child_cpr_steps
    - action: utter_child_cpr

- rule: Hands-only CPR
  steps:
    - intent: hands_only_cpr
    - action: utter_hands_only_cpr

- rule: Compression depth
  steps:
    - intent: compression_depth
    - action: utter_compression_depth

- rule: Compression rate
  steps:
    - intent: compression_rate
    - action: utter_compression_rate

- rule: Rescue breaths
  steps:
    - intent: rescue_breaths
    - action: utter_rescue_breaths

- rule: AED pad placement
  steps:
    - intent: aed_pad_placement
    - action: utter_aed_pad_placement

- rule: AED no shock advised
  steps:
    - intent: aed_no_shock_advised
    - action: utter_aed_no_shock_advised

- rule: AED on wet person
  steps:
    - intent: aed_on_wet_person
    - action: utter_aed_on_wet_person

- rule: When to start CPR
  steps:
    - intent: when_to_start_cpr
    - action: utter_when_to_start_cpr

- rule: When to stop CPR
  steps:
    - intent: when_to_stop_cpr
    - action: utter_when_to_stop_cpr

- rule: CPR based on adult entity
  condition:
    - slot_was_set:
        - age_group: adult
  steps:
    - action: utter_adult_cpr

- rule: CPR based on child entity
  condition:
    - slot_was_set:
        - age_group: child
  steps:
    - action: utter_child_cpr
   
- rule: Start CPR when breathing status is bad
  condition:
    - slot_was_set:
        - breathing_status: not breathing
  steps:
    - action: utter_when_to_start_cpr

- rule: Start CPR when unconscious
  condition:
    - slot_was_set:
        - consciousness: unconscious
  steps:
    - action: utter_when_to_start_cpr

- rule: CPR summary on repeat
  steps:
    - intent: cpr_repeat
    - action: utter_cpr_summary


########################################
# CHOKING-SPECIFIC RULES
########################################

- rule: Choking adult
  steps:
    - intent: choking_adult
    - action: utter_choking_adult

- rule: Choking child
  steps:
    - intent: choking_child
    - action: utter_choking_child


########################################
#  REQUIRED RULES
########################################

- rule: Out of scope first aid
  steps:
    - intent: out_of_scope_first_aid
    - action: utter_out_of_scope_first_aid

