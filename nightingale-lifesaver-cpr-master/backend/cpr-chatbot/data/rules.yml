version: "3.1"

rules:
# Basic conversation management
- rule: Ask the user to rephrase whenever they send a message with low NLU confidence
  steps:
  - intent: nlu_fallback
  - action: utter_please_rephrase

- rule: Say goodbye
  steps:
  - intent: goodbye
  - action: utter_goodbye

- rule: Bot challenge
  steps:
  - intent: bot_challenge
  - action: utter_iamabot

- rule: Ask if that helped and user says yes
  steps:
  - action: utter_did_that_help
  - intent: affirm
  - action: utter_happy

- rule: Ask if that helped and user says no
  steps:
  - action: utter_did_that_help
  - intent: deny
  - action: utter_cheer_up

- rule: Greet user
  steps:
  - intent: greet
  - action: utter_greet

- rule: Thank you response
  steps:
  - intent: thank_you
  - action: utter_thank_back

- rule: Cardiac arrest explanation
  steps:
  - intent: what_is_cardiac_arrest
  - action: utter_cardiac_arrest_explanation

- rule: CPR steps
  steps:
  - intent: how_to_cpr
  - action: utter_cpr_steps

- rule: Emergency numbers
  steps:
  - intent: what_are_emergency_numbers
  - action: utter_emergency_numbers

- rule: Symptoms description
  steps:
  - intent: symptoms
  - action: utter_symptoms_description_one

- rule: Choking help
  steps:
  - intent: choking_help
  - action: utter_choking_help

- rule: Bleeding control
  steps:
  - intent: bleeding_control
  - action: utter_bleeding_control

- rule: Burns treatment
  steps:
  - intent: burns_treatment
  - action: utter_burns_treatment

- rule: Fracture help
  steps:
  - intent: fracture_help
  - action: utter_fracture_help

- rule: Stroke recognition
  steps:
  - intent: stroke_recognition
  - action: utter_stroke_recognition

- rule: Seizure help
  steps:
  - intent: seizure_help
  - action: utter_seizure_help

- rule: Allergic reaction
  steps:
  - intent: allergic_reaction
  - action: utter_allergic_reaction

- rule: Recovery position
  steps:
  - intent: recovery_position
  - action: utter_recovery_position

- rule: Child CPR
  steps:
  - intent: child_cpr
  - action: utter_child_cpr

- rule: What is defibrillator
  steps:
  - intent: what_is_defibrillator
  - action: utter_what_is_defibrillator

- rule: How to use defibrillator
  steps:
  - intent: how_to_defibrillator
  - action: utter_how_to_defibrillator

- rule: Shock treatment
  steps:
  - intent: shock_treatment
  - action: utter_shock_treatment

- rule: Hypothermia help
  steps:
  - intent: hypothermia_help
  - action: utter_hypothermia_help

- rule: Heat exhaustion
  steps:
  - intent: heat_exhaustion
  - action: utter_heat_exhaustion

- rule: Poisoning help
  steps:
  - intent: poisoning_help
  - action: utter_poisoning_help

- rule: Drowning rescue
  steps:
  - intent: drowning_rescue
  - action: utter_drowning_rescue