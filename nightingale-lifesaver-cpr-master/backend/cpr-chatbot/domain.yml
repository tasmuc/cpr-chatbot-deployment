responses:
  utter_greet:
   - text: |
      🚨 Emergency First Aid Assistant 🚨
      
      Hello! I'm here to help with first aid guidance and emergency procedures.
      
      ⚠️ **IMPORTANT**: For real emergencies, call:
      • 112 (Europe) • 911 (USA) • 999 (UK)
      
      How can I assist you today?

  utter_please_rephrase:
   - text: |
      I'm sorry, I didn't quite understand that. Please ask questions related to CPR and first aid procedures.
      
      You can ask about:
      • CPR instructions
      • Emergency numbers
      • First aid for injuries
      • Medical emergencies

  utter_cardiac_arrest_explanation:
   - text: |
      **Cardiac Arrest** 💔
      
      Cardiac arrest occurs when the heart suddenly stops beating effectively, causing:
      • Loss of consciousness
      • No normal breathing
      • No pulse
      • Blood stops circulating
      
      ⚠️ **This is a LIFE-THREATENING emergency**
      
      Without immediate CPR, death can occur within minutes. Call emergency services immediately!

  utter_cpr_steps:
   - text: |
      **CPR Steps** 🫀
      
      1. **Check scene safety** - Ensure area is safe
      2. **Check responsiveness** - Tap shoulders, shout 'Are you okay?'
      3. **Call for help** - Dial emergency number immediately
      4. **Position hands** - Center of chest, between nipples
      5. **Push hard & fast** - 30 chest compressions (2 inches deep)
      6. **Give 2 breaths** - Tilt head back, lift chin
      7. **Continue cycles** - 30:2 until help arrives
      
      💡 **Remember**: Push to the beat of 'Stayin Alive' (100-120 BPM)

  utter_emergency_numbers:
   - text: |
      **Emergency Numbers** 📞
      
      🌍 **International**:
      • Europe: **112**
      • USA/Canada: **911**
      • UK: **999**
      • Australia: **000**
      • New Zealand: **111**
      
      ⚠️ **Always call FIRST in life-threatening situations!**
      
      📋 When calling:
      • State your location clearly
      • Describe the emergency
      • Follow dispatcher instructions
      • Don't hang up until told

  utter_emergency_numbers_examples:
   - text: |
      **When to Call Emergency Services** 🚨
      
      • Unconscious person
      • No breathing/difficulty breathing
      • Chest pain/heart attack
      • Severe bleeding
      • Choking (cannot speak/breathe)
      • Suspected stroke
      • Serious injuries
      • Poisoning
      • Severe allergic reactions
      
      ⏰ **Time is critical** - Don't hesitate to call!

  utter_symptoms_description_one:
   - text: |
      **Cardiac Arrest Signs** ⚠️
      
      🔍 **Look for**:
      • Sudden collapse
      • No response to voice/touch
      • No normal breathing (or gasping)
      • No pulse
      • Skin turns blue/pale
      • Eyes may roll back
      
      🚨 **If you see these signs**:
      1. Call emergency services immediately
      2. Start CPR right away
      3. Find an AED if available
      
      ⏰ **Every second counts!**

  utter_choking_help:
   - text: |
      **Choking Emergency** 🫁
      
      **For Adults/Children over 1 year**:
      1. **Encourage coughing** if they can
      2. **5 back blows** - bend person forward, hit between shoulder blades
      3. **5 abdominal thrusts** (Heimlich) - hands just above navel, thrust upward
      4. **Alternate** back blows and abdominal thrusts
      5. **Call emergency** if object doesn't clear
      
      **For Infants under 1 year**:
      • Use back blows and chest thrusts only
      • NO abdominal thrusts for babies

  utter_bleeding_control:
   - text: |
      **Severe Bleeding Control** 💉
      
      1. **Apply direct pressure** - Use clean cloth/gauze, press firmly
      2. **Elevate** injured area above heart if possible
      3. **Don't remove** embedded objects
      4. **Add more bandages** if blood soaks through (don't remove first layer)
      5. **Apply pressure points** if bleeding continues
      6. **Consider tourniquet** for life-threatening limb bleeding
      
      🚨 **Call emergency for**:
      • Arterial bleeding (bright red, spurting)
      • Severe blood loss
      • Shock symptoms

  utter_burns_treatment:
   - text: |
      **Burn Treatment** 🔥
      
      **Immediate steps**:
      1. **Remove from heat source** safely
      2. **Cool with water** - 10-20 minutes of cool (not ice-cold) running water
      3. **Remove jewelry/clothing** before swelling (if not stuck)
      4. **Cover loosely** with clean, non-stick bandage
      5. **Pain relief** - over-the-counter pain medication
      
      🚨 **Seek emergency care for**:
      • Burns larger than palm
      • Deep burns (white/charred)
      • Chemical/electrical burns
      • Burns on face, hands, genitals
      • Signs of infection

  utter_fracture_help:
   - text: |
      **Fracture/Broken Bone** 🦴
      
      **Signs**:
      • Severe pain
      • Swelling/bruising
      • Deformity
      • Cannot use/move limb
      • Bone visible (open fracture)
      
      **First Aid**:
      1. **Don't move** the person unless in danger
      2. **Immobilize** the injury (splint above and below fracture)
      3. **Apply ice** wrapped in cloth (20 min on/off)
      4. **Monitor** for shock
      5. **Seek medical care** immediately
      
      ⚠️ **Never** try to realign bones!

  utter_stroke_recognition:
   - text: |
      **Stroke Recognition - FAST Test** 🧠
      
      **F** - **FACE**: Does face droop? Smile uneven?
      **A** - **ARMS**: Can they lift both arms? One drift down?
      **S** - **SPEECH**: Slurred or strange speech?
      **T** - **TIME**: Call emergency immediately!
      
      **Other signs**:
      • Sudden confusion
      • Severe headache
      • Vision problems
      • Loss of balance
      • Numbness (especially one side)
      
      ⏰ **Time is brain** - Every minute matters!

  utter_seizure_help:
   - text: |
      **Seizure First Aid** ⚡
      
      **During seizure**:
      1. **Stay calm** and time the seizure
      2. **Clear the area** - remove hard/sharp objects
      3. **Protect head** - place something soft underneath
      4. **Turn on side** if possible (recovery position)
      5. **Don't put anything in mouth**
      6. **Don't restrain** the person
      
      🚨 **Call emergency if**:
      • Seizure lasts >5 minutes
      • Person doesn't wake up
      • Multiple seizures
      • Injury occurs
      • First-time seizure

  utter_allergic_reaction:
   - text: |
      **Severe Allergic Reaction (Anaphylaxis)** 🚨
      
      **Signs**:
      • Difficulty breathing/wheezing
      • Swelling (face, lips, throat)
      • Rapid weak pulse
      • Nausea/vomiting
      • Dizziness/fainting
      • Skin rash/hives
      
      **Immediate action**:
      1. **Call emergency** immediately
      2. **Use EpiPen** if available (inject into thigh)
      3. **Have person lie down** with legs elevated
      4. **Loosen tight clothing**
      5. **Be ready for CPR**
      
      ⚠️ **This can be fatal within minutes!**

  utter_recovery_position:
   - text: |
      **Recovery Position** 😴
      
      **Use when person is**:
      • Unconscious but breathing normally
      • Responsive but drowsy
      
      **Steps**:
      1. **Kneel beside** them
      2. **Place nearest arm** at right angle to body
      3. **Bring far arm** across chest to opposite cheek
      4. **Bend far leg** at knee
      5. **Roll toward you** onto their side
      6. **Tilt head back** slightly to keep airway open
      7. **Monitor breathing** continuously

  utter_child_cpr:
   - text: |
      **Child/Infant CPR** 👶
      
      **Children (1-8 years)**:
      • Use **heel of one hand** or both hands
      • Compress **1/3 chest depth** (about 2 inches)
      • **30 compressions : 2 breaths**
      • Rate: **100-120 per minute**
      
      **Infants (under 1 year)**:
      • Use **2 fingers** on breastbone
      • Compress **1/3 chest depth** (1.5 inches)
      • **30 compressions : 2 breaths**
      • **Cover mouth AND nose** for breaths
      
      🚨 **Call emergency first**, then start CPR

   - text: |
      **To give CPR to a child:**
      1. Look around and check for safety.
      2. Tap the child and check for breathing.
      3. Call for help right away.
      4. Place your hands in the middle of the chest.
      5. Push gently but firmly, one-third of the chest depth.
      6. Do 30 pushes and 2 gentle breaths.
      7. Keep going until help takes over.

   - text: |
      **CPR for children:**
      1. Ensure the place is safe for you and the child.
      2. Check if the child is awake and breathing.
      3. Call emergency services.
      4. Start chest compressions in the center of the chest.
      5. Push down one-third of the chest depth at a steady speed.
      6. Add 2 small breaths after 30 pushes if trained.
      7. Continue CPR until the child responds or help arrives.

  utter_what_is_defibrillator:
   - text: |
      **AED (Automated External Defibrillator)** ⚡
      
      An AED is a portable device that:
      • **Analyzes heart rhythm**
      • **Delivers electric shock** to restart normal heart rhythm
      • **Guides you** with voice prompts
      • **Only shocks when needed**
      
      📍 **Found in**:
      • Airports, malls, schools
      • Gyms, offices
      • Public buildings
      
      💡 **Anyone can use** - the device tells you exactly what to do!

  utter_how_to_defibrillator:
   - text: |
      **How to Use AED** ⚡
      
      1. **Turn on** AED (follow voice prompts)
      2. **Attach pads** as shown in pictures:
         • One on upper right chest
         • One on lower left side
      3. **Ensure no one touches** patient
      4. **Press analyze** button
      5. **If shock advised**:
         • Ensure everyone clear
         • Press shock button
      6. **Immediately resume CPR** for 2 minutes
      7. **Follow AED prompts**
      
      🔊 **The AED will guide you through everything!**

  utter_shock_treatment:
   - text: |
      **Medical Shock Treatment** 🩸
      
      **Signs of shock**:
      • Pale, cool, clammy skin
      • Rapid weak pulse
      • Rapid shallow breathing
      • Confusion/anxiety
      • Weakness/fatigue
      
      **Treatment**:
      1. **Call emergency** immediately
      2. **Treat underlying cause** (bleeding, etc.)
      3. **Lay person down** with legs elevated 12 inches
      4. **Keep warm** but don't overheat
      5. **Nothing by mouth**
      6. **Monitor breathing/pulse**
      
      ⚠️ **Shock can be life-threatening!**

  utter_hypothermia_help:
   - text: |
      **Hypothermia** 🥶
      
      **Signs**:
      • Shivering (stops in severe cases)
      • Confusion/slurred speech
      • Drowsiness
      • Weak pulse
      • Shallow breathing
      
      **Treatment**:
      1. **Move to warm area**
      2. **Remove wet clothing**
      3. **Warm gradually** - blankets, warm drinks (if conscious)
      4. **Warm center first** (chest, neck, head)
      5. **Handle gently** - avoid rough movement
      6. **Seek medical care**
      
      ❌ **Don't use**: Direct heat, alcohol, massage

  utter_heat_exhaustion:
   - text: |
      **Heat Exhaustion/Heat Stroke** 🌡️
      
      **Heat Exhaustion**:
      • Heavy sweating or stopped sweating
      • Nausea/vomiting
      • Headache/dizziness
      • Muscle cramps
      
      **Heat Stroke** (EMERGENCY):
      • High body temperature (>104°F)
      • Altered mental state
      • Hot, dry skin OR profuse sweating
      
      **Treatment**:
      1. **Move to cool area**
      2. **Remove excess clothing**
      3. **Cool with water** (wet cloths, spray)
      4. **Fan the person**
      5. **Give cool water** if conscious
      
      🚨 **Heat stroke = call emergency!**

  utter_poisoning_help:
   - text: |
      **Poisoning Emergency** ☠️
      
      **Signs**:
      • Nausea/vomiting
      • Abdominal pain
      • Difficulty breathing
      • Confusion/drowsiness
      • Burns around mouth
      • Strange odor
      
      **Immediate steps**:
      1. **Call Poison Control**: 1-800-222-1222 (US)
      2. **Call emergency** if unconscious/not breathing
      3. **Identify poison** if possible
      4. **Follow poison control instructions**
      5. **Save poison container/vomit** for medical team
      
      ❌ **Don't induce vomiting** unless told by expert!

  utter_drowning_rescue:
   - text: |
      **Drowning/Near-Drowning** 🌊
      
      **Rescue (if trained)**:
      1. **Throw, don't go** - use flotation device
      2. **Reach with object** if from shore
      3. **Row to victim** if boat available
      4. **Swimming rescue** only if trained
      
      **After rescue**:
      1. **Check breathing** immediately
      2. **Start CPR** if not breathing
      3. **Call emergency** services
      4. **Keep warm**
      5. **Monitor for secondary drowning**
      
      ⚠️ **Even rescued victims need medical evaluation!**

  utter_thank_back:
   - text: |
      You're very welcome! 😊
      
      Remember: **In real emergencies, always call professional help first!**
      
      Stay safe and feel free to ask if you need more first aid guidance.

  utter_goodbye:
   - text: |
      Stay safe! 🛡️
      
      Remember these emergency numbers:
      • **112** (Europe)
      • **911** (USA)
      • **999** (UK)
      
      I'm here 24/7 if you need first aid guidance. Take care!

  utter_did_that_help:
   - text: |
      Did this information help you? 🤔
      
      Do you have any other questions about first aid or emergency procedures?

  utter_happy:
   - text: |
      Great! I'm glad I could help! 😊
      
      **Remember**: Practice makes perfect with first aid skills. Consider taking a certified first aid course for hands-on training.
      
      Anything else I can help with?

  utter_cheer_up:
   - text: |
      Don't worry! 💪 Learning first aid can feel overwhelming, but you're doing great by seeking information.
      
      **Every bit of knowledge can save a life!**
      
      Let me try to explain it differently. What specific part would you like me to clarify?

  utter_iamabot:
   - text: |
      I am a bot, powered by Rasa, specialized in CPR and first aid guidance. 🤖
      I'm here to help you with emergency procedures and first aid questions 24/7!

  utter_adult_cpr:
    - text: |
        **Adult CPR steps:**
        1. First, check that the place is safe for you and the person.
        2. Check if the person responds and if they are breathing normally.
        3. Call emergency services or ask someone nearby to call.
        4. Put your hands in the center of the chest and start chest pushes.
        5. Push hard and fast, about **5–6** cm deep, at **100–120** pushes per minute.
        6. If you know how, give 30 chest pushes and then 2 rescue breaths.
        7. Continue CPR until help arrives or the person starts to move or breathe.

    - text: |
       **To give CPR to an adult:**
       1. Make sure the place is safe.
       2. Tap the person and check for breathing.
       3. Call for help or ask someone to call.
       4. Put your hands in the middle of the chest.
       5. Push hard and fast, **5–6** cm deep.
       6. Do 30 pushes and 2 breaths if you know how.
       7. Keep going until help takes over.

    - text: |
       **CPR for adults:**
       1. Look around and make sure it is safe.
       2. Check if the person is awake and breathing.
       3. Call emergency services right away.
       4. Start chest compressions in the center of the chest.
       5. Push down **5–6** cm at a fast rhythm.
       6. Add 2 rescue breaths after 30 pushes if trained.
       7. Continue CPR until the person moves or help arrives.       

  utter_hands_only_cpr:
   - text: |
        1. Use hands-only CPR if you do not know how or do not want to give rescue breaths.
        2. First, call emergency services or ask someone to call for you.
        3. Put the heel of your hand in the middle of the person’s chest and put your other hand on top.
        4. Push hard and fast in the center of the chest, at **100–120** pushes per minute.
        5. Do not stop unless the person moves, help arrives, or you are too tired to continue.
        6. This helps keep blood moving to the brain and heart.

   - text: |
      **To give hands-only CPR:**
      1. Make sure someone calls for help.
      2. Place your hands in the middle of the chest.
      3. Push down hard and fast without stopping.
      4. Aim for **100–120** pushes each minute.
      5. Continue until help takes over.

   - text: |
      **Hands-only CPR steps:**
      1. Call for emergency help.
      2. Put both hands on the center of the chest.
      3. Push quickly and strongly.
      4. Keep a steady rhythm.
      5. Do not stop until help arrives.

  utter_compression_depth:
   - text: |
       **Compression depth for adults:**
       1. Place your hands in the center of the chest.
       2. Push the chest down about 5 cm deep with each push.
       3. Let the chest come all the way back up after every push.
       4. Keep your arms straight and use your body weight to push.
       5. The right depth helps the heart pump blood through the body.
       6. Try to keep the same depth for every push.

   - text: |
      **How deep to push:**
      1. Push the chest down **5–6** cm.
      2. Do not bend your arms.
      3. Allow the chest to come back up each time.
      4. Keep a steady rhythm.
      5. Depth helps the heart pump blood.

   - text: |
      **Chest compression depth:**
      1. Push down at least 5 cm.
      2. Use strong, steady pressure.
      3. Let the chest return fully.
      4. Keep your hands in the same place.
      5. Repeat without long pauses.

  utter_compression_rate:
   - text: |
       **Compression rate:**
       1. Push the chest at a speed of 100 to 120 pushes every minute.
       2. This is a little faster than one push every second.
       3. Keep a steady rhythm and do not stop unless needed.
       4. Try not to push too slowly or too quickly.
       5. If you get very tired, ask another person to take over if possible.
       6. Keeping the right speed helps blood move to the brain and heart.

   - text: |
      **How fast to push:**
      1. Aim for **100–120** pushes each minute.
      2. Keep a strong, steady beat.
      3. Do not push too slowly.
      4. Do not push too fast.
      5. Try not to stop.

   - text: |
      **Chest compression speed:**
      1. Push quickly at **100–120** pushes per minute.
      2. Keep your hands in the center of the chest.
      3. Stay steady and do not pause.
      4. Ask someone to take over if you get tired.
      5. Speed helps keep blood moving.

  utter_rescue_breaths:
   - text: |
       **Rescue breaths:**
        1. Tilt the person’s head back and lift their chin to open the airway.
        2. Close their nose with your fingers and place your mouth over theirs.
        3. Give one slow breath for about one second and watch if the chest rises.
        4. Give a second breath if the chest rises or after adjusting the head if it did not.
        5. After 2 breaths, go back to chest pushes right away.
        6. Rescue breaths give oxygen to the lungs and blood.

   - text: |
      **How to give rescue breaths:**
      1. Open the airway by tilting the head back.
      2. Cover the person’s mouth with yours.
      3. Blow gently for one second.
      4. Check if the chest rises.
      5. Give two breaths after every 30 pushes.

   - text: |
      **Giving breaths:**
      1. Lift the chin and tilt the head.
      2. Pinch the nose closed.
      3. Blow air into the mouth for one second.
      4. Look for chest movement.
      5. Then return to chest compressions.

  utter_aed_pad_placement:
   - text: |
       **AED pad placement:**
       1. Open the AED and turn it on; listen to the voice instructions.
       2. Expose the person’s chest so the skin is bare.
       3. Place one pad on the upper right side of the chest.
       4. Place the other pad on the lower left side of the chest, below the armpit.
       5. Make sure the pads stick well to the skin.
       6. Do not touch the person when the AED tells you it is checking the heart or giving a shock.

   - text: |
      **To place AED pads:**
      1. Open the AED and switch it on.
      2. Put the first pad on the right side of the chest.
      3. Put the second pad below the left armpit.
      4. Press the pads firmly on the skin.
      5. Let the AED check the heart.

   - text: |
      **Using AED pads:**
      1. Turn on the AED.
      2. Stick one pad on the upper right chest.
      3. Stick the other on the lower left chest.
      4. Keep the chest dry and bare.
      5. Follow the AED instructions.

  utter_aed_no_shock_advised:
   - text: |
      **When the AED says “No shock advised”:**
      1. “No shock” does not mean the person is fine.
      2. It means a shock will not help the heart at this moment.
      3. Start chest pushes again right away and continue CPR.
      4. Keep the AED pads on the chest and do not remove them.
      5. The AED will check the heart again when it tells you.
      6. Follow the AED voice instructions until help arrives or the person wakes up.

   - text: |
      **If the AED says no shock:**
      1. Begin CPR right away.
      2. Do not remove the pads.
      3. The AED will check again soon.
      4. Keep pushing the chest.
      5. Wait for help to arrive.

   - text: |
      **AED “No shock advised”:**
      1. Continue CPR immediately.
      2. Leave the pads in place.
      3. Let the AED recheck the heart.
      4. Follow all voice prompts.
      5. Do not stop until help arrives.

  utter_aed_on_wet_person:
    - text: |
       **Using an AED on a wet person:**
       1. If possible, move the person away from water to a dry place.
       2. Quickly dry the chest with a towel, cloth, or shirt where the pads will go.
       3. Make sure there is no water under the pads on the chest.
       4. Do not use alcohol or flammable liquids to clean the skin.
       5. Place the AED pads on the dry chest and follow the AED voice instructions.
       6. Keeping the chest dry helps the shock go safely to the heart.

    - text: |
       **If the AED says no shock:**
       1. Begin CPR right away.
       2. Do not remove the pads.
       3. The AED will check again soon.
       4. Keep pushing the chest.
       5. Wait for help to arrive.

    - text: |
       **AED “No shock advised”:**
       1. Continue CPR immediately.
       2. Leave the pads in place.
       3. Let the AED recheck the heart.
       4. Follow all voice prompts.
       5. Do not stop until help arrives.

  utter_when_to_start_cpr:
    - text: |
       **When to start CPR:**
       1. Call the person loudly and tap their shoulder to see if they respond.
       2. Look at their chest for up to 10 seconds to see if they are breathing normally.
       3. If they are not breathing or only gasping, start CPR right away.
       4. Do not spend a long time trying to find a pulse.
       5. In an emergency, it is better to start CPR than to wait and do nothing.
       6. Starting CPR quickly gives the person a better chance to survive.

    - text: |
       **To help a choking child:**
       1. Check if they can breathe or speak.
       2. If not, kneel so you are at their height.
       3. Put your fist above the belly button.
       4. Give quick upward thrusts.
       5. Continue until the blockage comes out.
       6. Begin CPR if the child becomes unconscious.

    - text: |
       **Child choking steps:**
       1. Encourage coughing if the child can still breathe.
       2. If they cannot breathe, kneel behind them.
       3. Place your fist above the belly button.
       4. Pull inward and upward with controlled force.
       5. Repeat until the airway is clear.
       6. Start CPR if the child stops responding

  utter_when_to_stop_cpr:
   - text: |
      **When to stop CPR:**
      1. Keep doing CPR until the person starts to breathe or move normally.
      2. You can pause briefly when the AED tells you it is checking the heart.
      3. Stop if trained medical help arrives and tells you to stop.
      4. Stop if the place becomes dangerous and you must move away.
      5. You may stop if you are too tired to push the chest correctly.
      6. If none of these happen, continue CPR to help the person as long as you can.

  utter_choking_adult:
   - text: |
      **Choking adult:**
      1. If the person can talk or cough, tell them to keep coughing strongly.
      2. If they cannot breathe, cough, or speak, stand behind them.
      3. Put your arms around their waist and make a fist just above the belly button.
      4. Grab your fist with your other hand and pull in and up quickly.
      5. Repeat these thrusts until the object comes out or the person becomes unconscious.
      6. If the person collapses, lay them on the floor and start CPR.

   - text: |
      **help a choking adult:**
      1. Ask if they can breathe or speak.
      2. If not, stand behind them and wrap your arms around.
      3. Place your fist above the belly button.
      4. Pull sharply in and up.
      5. Continue until the blockage comes out.
      6. If they faint, begin CPR.

   - text: |
      **Adult choking steps:**
      1. Tell them to cough if they can.
      2. If they cannot breathe, act fast.
      3. Stand behind and place your fist above the belly button.
      4. Pull inward and upward quickly.
      5. Repeat until the airway is clear.
      6. Start CPR if the person becomes unconscious.

  utter_choking_child:
   - text: |
      *Choking child:*
      1. If the child can cough or talk, tell them to keep coughing.
      2. If they cannot breathe, cough, or speak, kneel behind them so you are at their level.
      3. Place your fist above the child’s belly button and hold it with your other hand.
      4. Give quick, gentle thrusts in and up, using less force than for an adult.
      5. Continue until the object comes out or the child becomes unconscious.
      6. If the child stops breathing or collapses, start CPR and check the mouth carefully.

   - text: |
      **To help a choking child:**
      1. Check if they can breathe or speak.
      2. If not, kneel so you are at their height.
      3. Put your fist above the belly button.
      4. Give quick upward thrusts.
      5. Continue until the blockage comes out.
      6. Begin CPR if the child becomes unconscious.

   - text: |
      **Child choking steps:**
      1. Encourage coughing if the child can still breathe.
      2. If they cannot breathe, kneel behind them.
      3. Place your fist above the belly button.
      4. Pull inward and upward with controlled force.
      5. Repeat until the airway is clear.
      6. Start CPR if the child stops responding
   
  utter_out_of_scope_first_aid:
