      I can help with CPR and first aid guidance.
      This question is outside my scope.
      Please contact emergency services or a medical professional for more help.

  utter_cpr_summary:
   - text: |
      **Quick CPR reminder:**
      1. Push hard and fast in the center of the chest.
      2. Push **5–6** cm deep at **100–120** pushes per minute.
      3. Give 30 pushes and 2 breaths if trained.

